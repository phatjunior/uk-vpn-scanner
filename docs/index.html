<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK VPN Scanner — Dashboard</title>
    <meta name="description" content="Real-time dashboard for UK VPN Node Scanner. Monitor VLESS Reality node status, latency, and global distribution.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN SYSTEM
           ═══════════════════════════════════════════ */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-card-hover: rgba(30, 41, 59, 0.8);
            --border: rgba(99, 102, 241, 0.15);
            --border-hover: rgba(99, 102, 241, 0.35);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #6366f1;
            --accent-cyan: #22d3ee;
            --accent-emerald: #34d399;
            --accent-amber: #fbbf24;
            --accent-rose: #fb7185;
            --accent-purple: #a78bfa;
            --gradient-main: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-success: linear-gradient(135deg, #059669 0%, #34d399 100%);
            --gradient-danger: linear-gradient(135deg, #dc2626 0%, #fb7185 100%);
            --gradient-info: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        /* ═══════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 600px 400px at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 60%, rgba(139, 92, 246, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 90%, rgba(34, 211, 238, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: meshDrift 20s ease-in-out infinite alternate;
        }

        @keyframes meshDrift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 15px) scale(1.05); }
            100% { transform: translate(10px, -10px) scale(0.98); }
        }

        /* ═══════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════ */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ═══════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════ */
        .header {
            padding: 40px 0 32px;
            text-align: center;
        }

        .header__badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent-blue);
            margin-bottom: 20px;
            letter-spacing: 0.02em;
        }

        .header__badge .pulse {
            width: 8px; height: 8px;
            background: var(--accent-emerald);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .header__title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .header__subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 400;
        }

        /* ═══════════════════════════════════════════
           STATUS BAR
           ═══════════════════════════════════════════ */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin: 8px 0 36px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-item__icon {
            font-size: 1rem;
        }

        .status-item__value {
            color: var(--text-primary);
            font-weight: 600;
            font-family: var(--font-mono);
        }

        /* ═══════════════════════════════════════════
           SUBSCRIPTION CARD
           ═══════════════════════════════════════════ */
        .sub-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(139, 92, 246, 0.08) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-glow);
        }

        .sub-card__info {
            flex: 1;
            min-width: 200px;
        }

        .sub-card__title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sub-card__desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .sub-card__url {
            flex: 2;
            min-width: 280px;
            display: flex;
            gap: 10px;
        }

        .sub-card__input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--accent-cyan);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .sub-card__input:focus {
            border-color: var(--accent-blue);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn--primary {
            background: var(--gradient-main);
            color: white;
        }

        .btn--primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .btn--primary:active {
            transform: translateY(0);
        }

        /* ═══════════════════════════════════════════
           STAT CARDS GRID
           ═══════════════════════════════════════════ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .stat-card--scanned::before { background: var(--gradient-info); }
        .stat-card--working::before { background: var(--gradient-success); }
        .stat-card--dead::before { background: var(--gradient-danger); }
        .stat-card--rate::before { background: var(--gradient-main); }
        .stat-card--runs::before { background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%); }
        .stat-card--checks::before { background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%); }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-card);
        }

        .stat-card__label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .stat-card__value {
            font-size: 2rem;
            font-weight: 800;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }

        .stat-card--scanned .stat-card__value { color: var(--accent-cyan); }
        .stat-card--rate .stat-card__value { color: var(--accent-purple); }
        .stat-card--runs .stat-card__value { color: #f472b6; }
        .stat-card--checks .stat-card__value { color: #fb923c; }

        /* ═══════════════════════════════════════════
           SECTION
           ═══════════════════════════════════════════ */
        .section {
            margin-bottom: 40px;
        }

        .section__header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section__icon {
            font-size: 1.4rem;
        }

        .section__title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* ═══════════════════════════════════════════
           CHARTS ROW
           ═══════════════════════════════════════════ */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            backdrop-filter: blur(12px);
        }

        .chart-card__title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── Country Distribution (Bar Chart) ── */
        .country-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .country-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .country-bar__flag {
            width: 28px;
            font-size: 1.1rem;
            text-align: center;
            flex-shrink: 0;
        }

        .country-bar__code {
            width: 28px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .country-bar__track {
            flex: 1;
            height: 26px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .country-bar__fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--font-mono);
            color: white;
            min-width: 32px;
        }

        .country-bar__fill--1 { background: linear-gradient(90deg, #6366f1, #818cf8); }
        .country-bar__fill--2 { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .country-bar__fill--3 { background: linear-gradient(90deg, #0891b2, #22d3ee); }
        .country-bar__fill--4 { background: linear-gradient(90deg, #059669, #34d399); }
        .country-bar__fill--5 { background: linear-gradient(90deg, #d97706, #fbbf24); }
        .country-bar__fill--6 { background: linear-gradient(90deg, #dc2626, #fb7185); }
        .country-bar__fill--7 { background: linear-gradient(90deg, #7c3aed, #c084fc); }
        .country-bar__fill--8 { background: linear-gradient(90deg, #0e7490, #67e8f9); }

        /* ── Latency Distribution (Dot Plot) ── */
        .latency-chart {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .latency-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .latency-row__label {
            width: 80px;
            font-size: 0.78rem;
            font-family: var(--font-mono);
            color: var(--text-muted);
            text-align: right;
            flex-shrink: 0;
        }

        .latency-row__dots {
            flex: 1;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .latency-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            transition: transform 0.2s;
        }

        .latency-dot:hover {
            transform: scale(1.8);
        }

        .latency-dot--fast { background: var(--accent-emerald); }
        .latency-dot--medium { background: var(--accent-amber); }
        .latency-dot--slow { background: var(--accent-rose); }
        .latency-dot--very-slow { background: #991b1b; }

        .latency-legend {
            display: flex;
            gap: 20px;
            margin-top: 14px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .latency-legend__item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .latency-legend__dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* ═══════════════════════════════════════════
           NODES TABLE
           ═══════════════════════════════════════════ */
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        thead th {
            background: rgba(99, 102, 241, 0.08);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            white-space: nowrap;
        }

        .td-rank {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--text-muted);
            width: 48px;
            text-align: center;
        }

        .td-rank--top3 { color: var(--accent-amber); }

        .td-score {
            font-family: var(--font-mono);
            font-weight: 600;
        }

        .td-latency {
            font-family: var(--font-mono);
        }

        .td-speed {
            font-family: var(--font-mono);
        }

        .td-country {
            font-size: 1.1rem;
            text-align: center;
        }

        .td-host {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .td-sni {
            color: var(--accent-cyan);
            font-size: 0.82rem;
        }

        /* ── Score bar inside cell ── */
        .score-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-bar__track {
            width: 60px;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar__fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ── Latency badge ── */
        .latency-badge {
            display: inline-flex;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .latency-badge--fast {
            background: rgba(52, 211, 153, 0.12);
            color: var(--accent-emerald);
        }

        .latency-badge--medium {
            background: rgba(251, 191, 36, 0.12);
            color: var(--accent-amber);
        }

        .latency-badge--slow {
            background: rgba(251, 113, 133, 0.12);
            color: var(--accent-rose);
        }

        /* ═══════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════ */
        .footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        /* ═══════════════════════════════════════════
           LOADING STATE
           ═══════════════════════════════════════════ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 20px;
        }

        .loading__spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading__text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ═══════════════════════════════════════════
           ERROR STATE
           ═══════════════════════════════════════════ */
        .error-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-state__icon { font-size: 3rem; margin-bottom: 16px; }
        .error-state__title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .error-state__desc { color: var(--text-secondary); font-size: 0.9rem; }

        /* ═══════════════════════════════════════════
           ANIMATIONS
           ═══════════════════════════════════════════ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .animate-delay-1 { animation-delay: 0.1s; }
        .animate-delay-2 { animation-delay: 0.2s; }
        .animate-delay-3 { animation-delay: 0.3s; }
        .animate-delay-4 { animation-delay: 0.4s; }
        .animate-delay-5 { animation-delay: 0.5s; }

        /* ═══════════════════════════════════════════
           TOAST NOTIFICATION
           ═══════════════════════════════════════════ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-emerald);
            border-radius: var(--radius-sm);
            padding: 14px 24px;
            color: var(--accent-emerald);
            font-weight: 500;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .toast--visible {
            transform: translateY(0);
            opacity: 1;
        }

        /* ═══════════════════════════════════════════
           QUICK START SECTION
           ═══════════════════════════════════════════ */
        .quick-start {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 36px;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-card);
        }

        .quick-start__title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .step-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 768px) {
            .step-container { grid-template-columns: 1fr; gap: 20px; }
            .quick-start { padding: 24px 20px; }
        }

        .step-block {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 20px;
        }

        .step-block__header {
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 16px;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: var(--font-sans);
        }

        .app-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-blue);
            transform: translateX(4px);
        }
        
        .app-btn--import {
            background: linear-gradient(135deg, rgba(99,102,241,0.1) 0%, rgba(139,92,246,0.1) 100%);
            border-color: rgba(99,102,241,0.3);
        }
        
        .app-btn--import:hover {
            background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(139,92,246,0.2) 100%);
            border-color: var(--accent-purple);
        }

        .app-btn__icon {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 932px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .container { padding: 0 16px; }
            .sub-card { padding: 20px; flex-direction: column; }
            .sub-card__url { width: 100%; flex-direction: column; }
            .stat-card__value { font-size: 1.6rem; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .import-prefix { display: none; } /* Скрывает "Import to " на обычных смартфонах */
        }

        @media (max-width: 360px) {
            .app-btn span { display: none; } /* Скрывает "Get App ↗" и "Connect ↗" только на сверх-узких экранах */
        }

        /* ── Tooltips (JS-powered) ── */
        .tooltip-popup {
            position: fixed;
            background: rgba(17, 24, 39, 0.97);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: normal;
            max-width: 240px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            line-height: 1.5;
        }
        .tooltip-popup.visible {
            opacity: 1;
        }

        thead th[data-tooltip] {
            cursor: help;
            position: relative;
        }

        thead th[data-tooltip]::after {
            content: ' ℹ';
            font-size: 0.65rem;
            opacity: 0.5;
            font-style: normal;
        }

        /* ── Node Copy Button ── */
        .copy-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            vertical-align: middle;
            margin-left: 6px;
        }

        .copy-btn:hover {
            color: var(--accent-cyan);
            background: rgba(34, 211, 238, 0.1);
        }

        .copy-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ═══ HEADER ═══ -->
        <header class="header animate-in">
            <div class="header__badge">
                <span class="pulse"></span>
                Auto-updating every 2 hours
            </div>
            <h1 class="header__title">UK VPN Scanner</h1>
            <p class="header__subtitle">VLESS Reality Node Monitor — bypass UK Content Control</p>
        </header>

        <!-- ═══ STATUS BAR ═══ -->
        <div class="status-bar animate-in animate-delay-1" id="statusBar">
            <div class="status-item">
                <span class="status-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
                <span>Last scan:</span>
                <span class="status-item__value" id="lastUpdate">—</span>
            </div>
            <div class="status-item">
                <span class="status-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg></span>
                <span>Repos:</span>
                <span class="status-item__value" id="reposCount">—</span>
            </div>
        </div>

        <!-- ═══ SUBSCRIPTION CARD ═══ -->
        <div class="sub-card animate-in animate-delay-2" id="subCard">
            <div class="sub-card__info">
                <div class="sub-card__title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:-3px"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>Subscription URL</div>
                <div class="sub-card__desc">Add this URL to your VPN client (Hiddify, v2rayTun, Karing, etc.)</div>
            </div>
            <div class="sub-card__url">
                <input type="text" class="sub-card__input" id="subUrl" value="" readonly placeholder="Loading...">
                <button class="btn btn--primary" id="copyBtn" onclick="copySubUrl()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg> Copy
                </button>
            </div>
        </div>

        <!-- ═══ QUICK START ═══ -->
        <div class="quick-start animate-in animate-delay-2" id="quickStart" style="display: none;">
            <div class="quick-start__title">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
                Quick Start Guide
            </div>
            <div class="step-container">
                <!-- Step 1 -->
                <div class="step-block">
                    <div class="step-block__header"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:rgba(34,211,238,0.15);border-radius:50%;color:var(--accent-cyan);font-size:12px;margin-right:8px;">1</span> Install an App</div>
                    <div class="app-list">
                        <button class="app-btn" onclick="openStore('karing')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-cyan)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Karing</div>
                            <span style="font-size:0.8em;color:var(--text-muted)">Get App ↗</span>
                        </button>
                        <button class="app-btn" onclick="openStore('happ')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-cyan)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Happ</div>
                            <span style="font-size:0.8em;color:var(--text-muted)">Get App ↗</span>
                        </button>
                        <button class="app-btn" onclick="openStore('hiddify')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-cyan)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Hiddify</div>
                            <span style="font-size:0.8em;color:var(--text-muted)">Get App ↗</span>
                        </button>
                        <button class="app-btn" onclick="openStore('v2raytun')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-cyan)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> v2rayTun</div>
                            <span style="font-size:0.8em;color:var(--text-muted)">Get App ↗</span>
                        </button>
                    </div>
                </div>
                <!-- Step 2 -->
                <div class="step-block">
                    <div class="step-block__header"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:rgba(99,102,241,0.15);border-radius:50%;color:var(--accent-blue);font-size:12px;margin-right:8px;">2</span> Auto-Import</div>
                    <div class="app-list">
                        <button class="app-btn app-btn--import" onclick="autoImport('karing')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-blue)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> <span class="import-prefix">Import to </span>Karing</div>
                            <span style="font-size:0.8em;color:var(--accent-blue)">Connect ↗</span>
                        </button>
                        <button class="app-btn app-btn--import" onclick="autoImport('happ')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-blue)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> <span class="import-prefix">Import to </span>Happ</div>
                            <span style="font-size:0.8em;color:var(--accent-blue)">Connect ↗</span>
                        </button>
                        <button class="app-btn app-btn--import" onclick="autoImport('hiddify')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-blue)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> <span class="import-prefix">Import to </span>Hiddify</div>
                            <span style="font-size:0.8em;color:var(--accent-blue)">Connect ↗</span>
                        </button>
                        <button class="app-btn app-btn--import" onclick="autoImport('v2raytun')">
                            <div class="app-btn__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-blue)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> <span class="import-prefix">Import to </span>v2rayTun</div>
                            <span style="font-size:0.8em;color:var(--accent-blue)">Connect ↗</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ MAIN CONTENT (loaded dynamically) ═══ -->
        <div id="mainContent">
            <div class="loading">
                <div class="loading__spinner"></div>
                <div class="loading__text">Loading scan data...</div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        Copied to clipboard!
    </div>

    <script>
        // ═══════════════════════════════════════════════
        //  ICONS
        // ═══════════════════════════════════════════════
        const ICONS = {
            globe: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`,
            zap: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
            trophy: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-amber)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
            wifiOff: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-rose)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/><path d="M5 12.86a10 10 0 0 1 12.83-2.1"/></svg>`,
            activity: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
        };

        function renderApp(data) {
            const html = `
                ${renderHeader(data)}
                ${renderStatusBar(data)}
                ${renderQuickStart()}
                ${renderSubscriptionCard()}
                ${renderStatsGrid(data)}
                ${renderChartsRow(data)}
                ${renderNodesTable(data)}
                ${renderScanHistory(data)}
                <footer class="footer">
                    <p>UK VPN Scanner v2.5 — Auto-updates every 2 hours via GitHub Actions</p>
                    <p style="margin-top:6px">VLESS Reality nodes for bypassing UK Content Control</p>
                </footer>
            `;
            return html;
        }

        // ═══════════════════════════════════════════════
        //  DATA & STATE
        // ═══════════════════════════════════════════════

        const FLAG_EMOJI = {
            US:'🇺🇸',GB:'🇬🇧',DE:'🇩🇪',FR:'🇫🇷',NL:'🇳🇱',CA:'🇨🇦',JP:'🇯🇵',
            KR:'🇰🇷',SG:'🇸🇬',AU:'🇦🇺',IE:'🇮🇪',SE:'🇸🇪',NO:'🇳🇴',FI:'🇫🇮',
            DK:'🇩🇰',CH:'🇨🇭',AT:'🇦🇹',BE:'🇧🇪',ES:'🇪🇸',IT:'🇮🇹',PL:'🇵🇱',
            RU:'🇷🇺',TR:'🇹🇷',IN:'🇮🇳',BR:'🇧🇷',HK:'🇭🇰',TW:'🇹🇼',IL:'🇮🇱',
            ZA:'🇿🇦',MX:'🇲🇽',UA:'🇺🇦',RO:'🇷🇴',CZ:'🇨🇿',HU:'🇭🇺',PT:'🇵🇹',
            LU:'🇱🇺',BG:'🇧🇬',HR:'🇭🇷',LT:'🇱🇹',LV:'🇱🇻',EE:'🇪🇪',RS:'🇷🇸',
            MD:'🇲🇩',GE:'🇬🇪',AM:'🇦🇲',AZ:'🇦🇿',KZ:'🇰🇿',TH:'🇹🇭',VN:'🇻🇳',
            ID:'🇮🇩',PH:'🇵🇭',MY:'🇲🇾',IR:'🇮🇷',CL:'🇨🇱',AR:'🇦🇷',CO:'🇨🇴',
        };

        let statsData = null;

        // ═══════════════════════════════════════════════
        //  LOAD DATA
        // ═══════════════════════════════════════════════

        async function loadStats() {
            try {
                const resp = await fetch('stats.json?' + Date.now());
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                statsData = await resp.json();
                renderDashboard(statsData);
            } catch (err) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="error-state">
                        <div class="error-state__icon">${ICONS.wifiOff}</div>
                        <div class="error-state__title">No scan data available yet</div>
                        <div class="error-state__desc">
                            The scanner hasn't run yet or stats.json is not accessible.<br>
                            Run the scanner manually or wait for the next GitHub Actions cron.
                        </div>
                    </div>
                `;
                console.error('Failed to load stats:', err);
            }
        }

        // ═══════════════════════════════════════════════
        //  RENDER
        // ═══════════════════════════════════════════════

        function renderDashboard(data) {
            // ── Subscription URL ──
            const baseUrl = window.location.href.replace(/\/[^/]*$/, '');
            document.getElementById('subUrl').value = `${baseUrl}/phatVPN.txt`;
            document.getElementById('quickStart').style.display = 'block';

            // ── Status bar ──
            const dt = new Date(data.updated_at);
            document.getElementById('lastUpdate').textContent = formatRelativeTime(dt);
            document.getElementById('reposCount').textContent = data.scan_config?.repos_scanned || '—';

            // ── Main content ──
            document.getElementById('mainContent').innerHTML = `
                ${renderStatsGrid(data)}
                ${renderChartsRow(data)}
                ${renderNodesTable(data)}
                ${renderScanHistory(data)}
            `;

            // Trigger animations
            requestAnimationFrame(() => {
                document.querySelectorAll('.animate-in').forEach(el => {
                    el.style.opacity = '1';
                });
            });
        }

        function renderStatsGrid(data) {
            const histScanned = data.total_scraped_pool !== undefined ? data.total_scraped_pool : '—';
            const avgRate = data.historical_avg_rate !== undefined ? data.historical_avg_rate : data.success_rate;
            const totalRuns = data.total_runs_ever !== undefined ? data.total_runs_ever : '—';
            const totalChecks = data.total_checks_ever !== undefined ? data.total_checks_ever : '—';

            return `
            <div class="stats-grid animate-in animate-delay-3">
                <div class="stat-card stat-card--runs" data-tooltip="Total number of background scans executed since project launch.">
                    <div class="stat-card__label">Total Scanner Runs</div>
                    <div class="stat-card__value">${animateNumber(totalRuns)}</div>
                </div>
                <div class="stat-card stat-card--checks" data-tooltip="Cumulative count of all VLESS reality connections tested via Xray core across all rounds.">
                    <div class="stat-card__label">Total Checks Ever</div>
                    <div class="stat-card__value">${animateNumber(totalChecks)}</div>
                </div>
                <div class="stat-card stat-card--scanned" data-tooltip="Total unique VLESS configurations discovered from open sources in the current run before filtering.">
                    <div class="stat-card__label">Scraped Candidates</div>
                    <div class="stat-card__value" id="statScanned">${animateNumber(histScanned)}</div>
                </div>
                <div class="stat-card stat-card--rate" data-tooltip="Percentage of scanned nodes that successfully responded, averaged over the last 30 runs.">
                    <div class="stat-card__label">Avg Success Rate</div>
                    <div class="stat-card__value">${avgRate}%</div>
                </div>
            </div>
            `;
        }

        function renderChartsRow(data) {
            return `
            <div class="charts-row">
                ${renderCountryChart(data)}
                ${renderLatencyChart(data)}
            </div>
            `;
        }

        function renderCountryChart(data) {
            const countries = data.country_distribution || {};
            const sorted = Object.entries(countries).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const maxVal = sorted.length ? sorted[0][1] : 1;

            const bars = sorted.map(([code, count], i) => {
                const pct = Math.max((count / maxVal) * 100, 8);
                const flag = FLAG_EMOJI[code] || '🏳️';
                const colorClass = `country-bar__fill--${(i % 8) + 1}`;
                return `
                <div class="country-bar">
                    <span class="country-bar__flag">${flag}</span>
                    <span class="country-bar__code">${code}</span>
                    <div class="country-bar__track">
                        <div class="country-bar__fill ${colorClass}" style="width:${pct}%">${count}</div>
                    </div>
                </div>`;
            }).join('');

            return `
            <div class="chart-card animate-in animate-delay-4">
                <div class="chart-card__title">${ICONS.globe} Country Distribution</div>
                <div class="country-bars">${bars || '<p style="color:var(--text-muted)">No data</p>'}</div>
            </div>`;
        }

        function renderLatencyChart(data) {
            const nodes = data.top_nodes || [];
            if (!nodes.length) {
                return `
                <div class="chart-card animate-in animate-delay-4">
                    <div class="chart-card__title">${ICONS.zap} Latency Distribution</div>
                    <p style="color:var(--text-muted);padding:20px">No data</p>
                </div>`;
            }

            // Bucket into ranges
            const buckets = [
                { label: '< 500ms', min: 0, max: 500, dots: [], class: 'fast' },
                { label: '500-1000ms', min: 500, max: 1000, dots: [], class: 'medium' },
                { label: '1000-2000ms', min: 1000, max: 2000, dots: [], class: 'slow' },
                { label: '> 2000ms', min: 2000, max: Infinity, dots: [], class: 'very-slow' },
            ];

            nodes.forEach(n => {
                const lat = n.latency_ms;
                for (const b of buckets) {
                    if (lat >= b.min && lat < b.max) {
                        b.dots.push(n);
                        break;
                    }
                }
            });

            const rows = buckets.map(b => {
                const dots = b.dots.map(n => {
                    const cc = FLAG_EMOJI[n.country] || n.country;
                    return `<div class="latency-dot latency-dot--${b.class}" title="${cc} ${n.latency_ms}ms ${n.sni}"></div>`;
                }).join('');
                return `
                <div class="latency-row">
                    <span class="latency-row__label">${b.label}</span>
                    <div class="latency-row__dots">${dots}</div>
                </div>`;
            }).join('');

            return `
            <div class="chart-card animate-in animate-delay-4">
                <div class="chart-card__title">${ICONS.zap} Latency Distribution</div>
                <div class="latency-chart">${rows}</div>
                <div class="latency-legend">
                    <div class="latency-legend__item">
                        <div class="latency-legend__dot" style="background:var(--accent-emerald)"></div> Fast (&lt;500ms)
                    </div>
                    <div class="latency-legend__item">
                        <div class="latency-legend__dot" style="background:var(--accent-amber)"></div> Medium
                    </div>
                    <div class="latency-legend__item">
                        <div class="latency-legend__dot" style="background:var(--accent-rose)"></div> Slow (1-2s)
                    </div>
                    <div class="latency-legend__item">
                        <div class="latency-legend__dot" style="background:#991b1b"></div> Very Slow (&gt;2s)
                    </div>
                </div>
            </div>`;
        }

        function renderNodesTable(data) {
            const nodes = data.top_nodes || [];
            if (!nodes.length) return '';

            const maxScore = nodes.length ? nodes[0].score : 1;

            const rows = nodes.map(n => {
                const flag = FLAG_EMOJI[n.country] || '🏳️';
                const rankClass = n.rank <= 3 ? 'td-rank--top3' : '';
                const scorePct = Math.max((n.score / maxScore) * 100, 5);
                const latClass = n.latency_ms < 500 ? 'fast' : n.latency_ms < 1500 ? 'medium' : 'slow';
                const speed = n.speed_mbps ? `${n.speed_mbps} Mbps` : '—';
                const lossLabel = n.packet_loss > 0 ? `<div style="font-size: 0.72rem; color: var(--accent-rose); font-weight: 500;">Loss: ${n.packet_loss}%</div>` : '';
                const uptime = n.uptime !== undefined ? `${n.uptime}%` : '—';
                const age = n.age_days !== undefined ? `${n.age_days}d` : '—';

                // Score bar color
                let barColor;
                if (scorePct > 70) barColor = 'var(--accent-emerald)';
                else if (scorePct > 40) barColor = 'var(--accent-amber)';
                else barColor = 'var(--accent-rose)';

                // Uptime color
                let uptimeColor = 'var(--text-secondary)';
                if (n.uptime !== undefined) {
                    if (n.uptime >= 90) uptimeColor = 'var(--accent-emerald)';
                    else if (n.uptime >= 60) uptimeColor = 'var(--accent-amber)';
                    else uptimeColor = 'var(--accent-rose)';
                }

                const safeRaw = n.raw ? n.raw.replace(/'/g, "\\'").replace(/"/g, '&quot;') : '';
                const copyBtn = n.raw ? `
                    <button class="copy-btn" onclick="copyNode('${safeRaw}', this)" title="Copy VLESS configuration URL">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                ` : '';

                return `
                <tr>
                    <td class="td-rank ${rankClass}">${n.rank <= 3 ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent-amber);vertical-align:middle;margin-right:2px"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>' : '#'} ${n.rank}</td>
                    <td class="td-score">
                        <div class="score-bar">
                            <span>${n.score}</span>
                            <div class="score-bar__track">
                                <div class="score-bar__fill" style="width:${scorePct}%;background:${barColor}"></div>
                            </div>
                        </div>
                    </td>
                    <td class="td-latency">
                        <span class="latency-badge latency-badge--${latClass}">${n.latency_ms}ms</span>
                    </td>
                    <td class="td-speed">${speed}${lossLabel}</td>
                    <td class="td-country" title="${n.country}">${flag}</td>
                    <td style="font-family: var(--font-mono); font-size: 0.85rem; color: ${uptimeColor}">${uptime}</td>
                    <td style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-secondary)">${age}</td>
                    <td class="td-host">${n.host}${copyBtn}</td>
                    <td class="td-sni">${n.sni}</td>
                </tr>`;
            }).join('');

            return `
            <div class="section animate-in animate-delay-5">
                <div class="section__header">
                    <span class="section__icon">${ICONS.trophy}</span>
                    <h2 class="section__title">Top ${nodes.length} Nodes</h2>
                </div>
                <div class="table-wrapper">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th data-tooltip="Position in the top list based on overall performance score.">Rank</th>
                                    <th data-tooltip="Overall quality score. Calculated from latency, speed, uptime, stability, and packet loss.">Score</th>
                                    <th data-tooltip="Average connection establishment latency (ping). Lower is better.">Latency</th>
                                    <th data-tooltip="Average download speed of a sample file. Packet loss rate is shown if any exists.">Speed</th>
                                    <th data-tooltip="Country location of the node, determined by GeoIP.">CC</th>
                                    <th data-tooltip="Historical percentage of successful checks. Restored dynamically via EMA.">Uptime</th>
                                    <th data-tooltip="Number of days since the node was first discovered.">Age</th>
                                    <th data-tooltip="IP address of the node server (masked for privacy). Includes a button to copy configuration.">Host</th>
                                    <th data-tooltip="SNI domain used to spoof traffic as trusted infrastructure.">SNI</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            </div>

            </div>
            `;
        }

        function renderScanHistory(data) {
            const history = data.scan_history || [];
            if (!history.length) return '';

            const rows = history.map((h, i) => {
                const dt = new Date(h.timestamp);
                const timeStr = formatRelativeTime(dt);
                const exactTime = dt.toLocaleString('en-GB', {
                    day: 'numeric', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                
                return `
                <tr>
                    <td style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-secondary);" title="${exactTime}">${timeStr}</td>
                    <td style="font-family: var(--font-mono);">${h.total_scanned}</td>
                    <td style="font-family: var(--font-mono); color: var(--accent-emerald); font-weight: 500;">${h.working}</td>
                    <td style="font-family: var(--font-mono); color: var(--accent-rose);">${h.dead}</td>
                    <td style="font-family: var(--font-mono); font-weight: 600; color: var(--accent-purple);">${h.success_rate}%</td>
                </tr>`;
            }).join('');

            return `
            <div class="section animate-in animate-delay-6" style="margin-top: 40px;">
                <div class="section__header">
                    <span class="section__icon">${ICONS.activity}</span>
                    <h2 class="section__title">Scanner Activity Log</h2>
                </div>
                <div class="table-wrapper">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th data-tooltip="Relative time when this scanning round completed. Hover for exact timestamp.">Scan Time</th>
                                    <th data-tooltip="Total VLESS Reality candidate nodes tested in this round.">Nodes Tested</th>
                                    <th data-tooltip="Number of functional nodes that responded and passed basic checks.">Working Nodes</th>
                                    <th data-tooltip="Number of nodes that were dead or failed to respond in this round.">Inactive Nodes</th>
                                    <th data-tooltip="Percentage of tested candidates that successfully responded.">Success Rate</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            </div>
            `;
        }

        // ═══════════════════════════════════════════════
        //  HELPERS
        // ═══════════════════════════════════════════════

        function animateNumber(n) {
            return n != null ? n.toLocaleString() : '—';
        }

        function formatRelativeTime(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMin = Math.floor(diffMs / 60000);
            const diffHr = Math.floor(diffMin / 60);

            if (diffMin < 1) return 'just now';
            if (diffMin < 60) return `${diffMin}m ago`;
            if (diffHr < 24) return `${diffHr}h ago`;
            return date.toLocaleDateString('en-GB', {
                day: 'numeric', month: 'short',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function copySubUrl() {
            const input = document.getElementById('subUrl');
            if (!input.value || input.value === 'Loading...') return;

            navigator.clipboard.writeText(input.value).then(() => {
                showToast("Subscription link copied to clipboard!");
            }).catch(() => {
                // Fallback
                input.select();
                document.execCommand('copy');
                showToast("Subscription link copied to clipboard!");
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message || "Subscription link copied to clipboard!";
            toast.classList.add('toast--visible');
            setTimeout(() => toast.classList.remove('toast--visible'), 2500);
        }

        function copyNode(uri, btn) {
            if (!uri) return;
            navigator.clipboard.writeText(uri).then(() => {
                showToast("Node config copied to clipboard!");
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent-emerald)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                btn.style.color = "var(--accent-emerald)";
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.color = "";
                }, 1500);
            }).catch(err => {
                console.error("Failed to copy node:", err);
            });
        }

        // ═══════════════════════════════════════════════
        //  JS TOOLTIP SYSTEM (works on mobile tap + desktop hover)
        // ═══════════════════════════════════════════════
        (function() {
            const popup = document.createElement('div');
            popup.className = 'tooltip-popup';
            document.body.appendChild(popup);
            let hideTimer = null;

            function showTooltip(el) {
                const text = el.getAttribute('data-tooltip');
                if (!text) return;
                popup.textContent = text;
                popup.classList.add('visible');

                const rect = el.getBoundingClientRect();
                const popupW = popup.offsetWidth;
                let left = rect.left + rect.width / 2 - popupW / 2;
                let top = rect.top - popup.offsetHeight - 8;

                // Keep within viewport
                if (left < 8) left = 8;
                if (left + popupW > window.innerWidth - 8) left = window.innerWidth - popupW - 8;
                if (top < 8) top = rect.bottom + 8; // flip below if no room above

                popup.style.left = left + 'px';
                popup.style.top = top + 'px';
            }

            function hideTooltip() {
                popup.classList.remove('visible');
            }

            // Desktop: hover
            document.addEventListener('mouseenter', e => {
                const el = e.target.closest('[data-tooltip]');
                if (el) {
                    clearTimeout(hideTimer);
                    showTooltip(el);
                }
            }, true);

            document.addEventListener('mouseleave', e => {
                const el = e.target.closest('[data-tooltip]');
                if (el) {
                    hideTimer = setTimeout(hideTooltip, 100);
                }
            }, true);

            // Mobile: tap to show, tap anywhere else to dismiss
            document.addEventListener('click', e => {
                const el = e.target.closest('[data-tooltip]');
                if (el) {
                    e.preventDefault();
                    if (popup.classList.contains('visible')) {
                        hideTooltip();
                    } else {
                        showTooltip(el);
                    }
                } else {
                    hideTooltip();
                }
            });
        })();

        // ═══════════════════════════════════════════════
        //  SMART LINKS LOGIC
        // ═══════════════════════════════════════════════

        const APP_LINKS = {
            karing: {
                ios: 'https://apps.apple.com/us/app/karing/id6472431552',
                android: 'https://dot.karing.app/client.html?tag=android-stable',
                scheme: 'karing://install-config?url='
            },
            happ: {
                ios: 'https://apps.apple.com/us/app/happ-proxy-utility/id6504287215',
                android: 'https://play.google.com/store/apps/details?id=com.happproxy',
                scheme: 'happ://add/'
            },
            hiddify: {
                ios: 'https://apps.apple.com/us/app/hiddify-proxy-vpn/id6596777532',
                android: 'https://play.google.com/store/apps/details?id=app.hiddify.com',
                scheme: 'hiddify://import/'
            },
            v2raytun: {
                ios: 'https://apps.apple.com/us/app/v2raytun/id6476628951',
                android: 'https://play.google.com/store/apps/details?id=com.v2raytun.android',
                scheme: 'v2raytun://import/'
            }
        };

        function getOS() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod|Macintosh/.test(ua)) return 'ios';
            if (/android/i.test(ua)) return 'android';
            return 'desktop';
        }

        function openStore(appId, currentWindow = false) {
            const os = getOS();
            const links = APP_LINKS[appId];
            // If desktop, default to iOS link, but they probably can't install it directly anyway
            let url = links[os] || links.ios; 
            if (currentWindow) {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }

        function autoImport(appId) {
            const subUrl = document.getElementById('subUrl').value;
            if (!subUrl || subUrl === 'Loading...') return;
            
            const links = APP_LINKS[appId];
            let importUrl = '';
            
            if (appId === 'karing') {
                importUrl = links.scheme + encodeURIComponent(subUrl);
            } else {
                importUrl = links.scheme + subUrl;
            }

            let hasLanded = false;
            const onBlur = () => {
                hasLanded = true;
                window.removeEventListener('blur', onBlur);
            };
            window.addEventListener('blur', onBlur);

            // Try to open custom scheme
            window.location.href = importUrl;

            // Fallback checking if app is not installed
            setTimeout(() => {
                window.removeEventListener('blur', onBlur);
                if (hasLanded || !document.hasFocus() || document.hidden) {
                    return;
                }
                const os = getOS();
                if (os === 'desktop') {
                    alert(`It seems ${appId} is not installed on your computer, or auto-import is not supported on desktop. Please copy the subscription URL manually.`);
                } else if (confirm(`It seems ${appId} is not installed. Would you like to download it now?`)) {
                    openStore(appId, true);
                }
            }, 2500);
        }

        // ═══════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════

        loadStats();
    </script>
</body>
